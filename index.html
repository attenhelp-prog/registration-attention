<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — Attention</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="register-wrapper">
        <div class="register-card">

            <!-- Логотип -->
            <div class="register-logo">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#8b7cf7" stroke-width="2">
                    <path d="M12 5v14M5 12h14" />
                </svg>
                <span>attention</span>
            </div>

            <h2 class="register-title">Добро пожаловать</h2>
            <p class="register-subtitle">Создай аккаунт и начни публиковать</p>

            <!-- Имя -->
            <div class="input-group">
                <input type="text" id="username" placeholder="Имя пользователя" class="input-field">
            </div>

            <!-- Email -->
            <div class="input-group">
                <input type="email" id="email" placeholder="Email" class="input-field">
            </div>

            <!-- Пароль -->
            <div class="input-group">
                <input type="password" id="password" placeholder="Пароль (мин. 6 символов)" class="input-field">
            </div>

            <!-- Подтверждение пароля -->
            <div class="input-group">
                <input type="password" id="passwordConfirm" placeholder="Подтверди пароль" class="input-field">
            </div>

            <!-- Политика + ссылка (открывается в новой вкладке) -->
            <label class="policy-check">
                <input type="checkbox" id="policyCheck">
                <span class="checkmark"></span>
                <span class="policy-text">
                    Я согласен с <a href="https://attenhelp-prog.github.io/Privacy-Policy/" target="_blank" rel="noopener noreferrer">Политикой конфиденциальности</a>
                </span>
            </label>

            <!-- Кнопка -->
            <button class="register-btn" id="registerBtn" disabled>Зарегистрироваться</button>

            <!-- Вход -->
            <p class="login-link">
                Уже есть аккаунт? <a href="login.html">Войти</a>
            </p>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
